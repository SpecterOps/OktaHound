name: Fetch vendored extensions

on:
  workflow_dispatch:
    inputs:
      fetch_github_extension:
        description: Fetch GitHound extension
        type: boolean
        required: false
        default: true
      fetch_scim_extension:
        description: Fetch SCIM extension
        type: boolean
        required: false
        default: true
      fetch_1password_extension:
        description: Fetch 1PassHound extension
        type: boolean
        required: false
        default: true
      fetch_snowhound_extension:
        description: Fetch SnowHound extension
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  fetch-vendored-extensions:
    runs-on: ubuntu-latest
    env:
      EXTENSIONS_DIR: Src/Extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure extension directory
        shell: bash
        run: |
          mkdir -p "${EXTENSIONS_DIR}"

      - name: Download GitHound extension
        if: ${{ inputs.fetch_github_extension }}
        shell: bash
        working-directory: ${{ env.EXTENSIONS_DIR }}
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/SpecterOps/GitHound/refs/heads/main/schema.json \
            -o bhce-github-extension.json

      - name: Download SCIM extension
        if: ${{ inputs.fetch_scim_extension }}
        shell: bash
        working-directory: ${{ env.EXTENSIONS_DIR }}
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/SpecterOps/bloodhound-scim-extension/refs/heads/main/bh-scim-extension.json \
            -o bh-scim-extension.json

      - name: Download 1PassHound extension
        if: ${{ inputs.fetch_1password_extension }}
        shell: bash
        working-directory: ${{ env.EXTENSIONS_DIR }}
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/SpecterOps/1PassHound/refs/heads/main/schema.json \
            -o bhce-1password-extension.json

      - name: Download SnowHound extension
        if: ${{ inputs.fetch_snowhound_extension }}
        shell: bash
        working-directory: ${{ env.EXTENSIONS_DIR }}
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/SpecterOps/SnowHound/refs/heads/main/schema.json \
            -o bhce-snowflake-extension.json

      - name: Detect changes
        id: changes
        shell: pwsh
        run: |
          [string] $status = git status --porcelain
          if ([string]::IsNullOrWhiteSpace($status)) {
            "No changes." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            return
          }

          "Files changed:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $status | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update vendored extensions"
          git push
