name: Update Documentation and Icons

on:
  push:
    paths:
      - Src/Extensions/bhce-okta-extension.json
      - Src/Queries/*.json
      - Src/PrivilegeZoneRules/*.json
      - Documentation/og-docs.json
      - OGDocsAutomation/Scripts/Render-*.ps1
      - .github/workflows/update-documentation.yml

permissions:
  contents: write

jobs:
  update-doc-and-icons:
    name: Update Doc and Icons
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Render documentation
        shell: pwsh
        run: |
          ./OGDocsAutomation/Scripts/Render-Docs.ps1 -Mode Local

      - name: Detect changes
        id: changes
        shell: pwsh
        run: |
          [string] $status = git status --porcelain
          if ([string]::IsNullOrWhiteSpace($status)) {
            "No changes." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            return
          }

          "Files changed:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $status | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update documentation"
          git push
